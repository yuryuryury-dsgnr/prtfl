<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dogly — Yury</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body { font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.7; color: #1A1A1A; background: #F8F7F4; }
    .container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
    a { color: inherit; text-decoration: none; }
    .back { display: inline-block; font-size: 14px; font-weight: 500; color: #6B6B6B; margin-top: 48px; margin-bottom: 80px; }
    .back:hover { color: #1A1A1A; }
    h1 { font-size: 40px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 24px; }
    .placeholder { color: #9A9A9A; font-size: 16px; margin-bottom: 120px; }
    .footer { border-top: 1px solid rgba(0,0,0,0.08); padding: 40px 0; }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .footer-name { font-weight: 500; }
    .footer-role { color: #6B6B6B; }
    .footer-right { display: flex; gap: 24px; color: #6B6B6B; }
    @media (max-width: 768px) {
      h1 { font-size: 32px; }
      .footer-inner { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../../" class="back">← Back to work</a>
    <h1>Dogly</h1>
    <p class="placeholder">Case study coming soon</p>
  </div>
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div><span class="footer-name">Yury</span> · <span class="footer-role">Lead UX Designer</span></div>
        <div class="footer-right">
          <a href="mailto:hello@yury.design">Email</a>
          <a href="https://linkedin.com" target="_blank" rel="noopener">LinkedIn</a>
          <span>Batumi, GE</span>
        </div>
      </div>
    </div>
  </footer>
</body>
</html>
